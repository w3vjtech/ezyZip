<!DOCTYPE html>
<html>
<head>
    <title>Chakra Academy Chatbot</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 420px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        .header {
            background: #2563eb;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .chat {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: #f1f5f9;
        }

        .msg { margin: 8px 0; }

        .user { text-align: right; }
        .bot { text-align: left; }

        .user span {
            background: #2563eb;
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            display: inline-block;
        }

        .bot span {
            background: white;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            display: inline-block;
        }

        .media {
            max-width: 150px;
            border-radius: 10px;
            margin-top: 5px;
        }

        .inputBox {
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
            gap: 5px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
        }

        button {
            padding: 10px;
            justify-content: space-between;
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }
        .voiceBox {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            gap: 10px;
            background-color: #f1f5f9;
            border-top: 1px solid #ccc;
        }
        .voiceText {
            font-size: 14px;
            color: #333;
        }
        .voiceBox button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">

    <div class="header">Chakra Academy Chatbot</div>

    <div class="chat" id="chat">
        <div class="msg bot">
            <span>👋 Welcome to Chakra Academy</span>
        </div>
    </div>

    <div class="inputBox">
        <input id="input" type="text" placeholder="Ask something...">
        <input type="file" id="file">

        <button onclick="send()">Send</button>
        <button onclick="sendFile()">Upload</button>
    </div>
<div class="voiceBox">
    <span class="voiceText">voice Assistant</span>
     <button onclick="startVoice()">🎤 Speak</button>
</div>
</div>

<script>
function send() {

    let input = document.getElementById("input");
    let chat = document.getElementById("chat");

    let msg = input.value.trim().toLowerCase();
    if (msg === "") return;

    chat.innerHTML += `
        <div class="msg user">
            <span>${input.value}</span>
        </div>
    `;

    input.value = "";

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: msg })
    })
    .then(res => res.json())
    .then(data => {

        chat.innerHTML += `
            <div class="msg bot">
                <span>${data.reply}</span>
            </div>
        `;
        chat.scrollTop = chat.scrollHeight;
        })
    .catch(err => {
        chat.innerHTML += `
            <div class="msg bot">
                <span>❌ Error: ${err.message}</span>
            </div>
        `;
    });
}



function sendFile() {

    let fileInput = document.getElementById("file");
    let chat = document.getElementById("chat");

    let file = fileInput.files[0];
    if (!file) return;

    let reader = new FileReader();

    reader.onload = function (e) {
        chat.innerHTML += `
            <div class="msg user">
                <span>📎 File uploaded</span><br>
                <img src="${e.target.result}" class="media">
            </div>
        `;
    };

    reader.readAsDataURL(file);
}


const SpeechRecognition =
window.SpeechRecognition || window.webkitSpeechRecognition;

const recognition = new SpeechRecognition();
recognition.lang = "en-US";

function startVoice() {
    recognition.start();
}

recognition.onresult = function(event) {
    let voiceText = event.results[0][0].transcript;
    document.getElementById("input").value = voiceText;
    send();
};

document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});
</script>

</body>
</html>
